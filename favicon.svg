<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
  </defs>
  <!-- Corpo da calculadora -->
  <rect x="8" y="6" width="48" height="52" rx="8" ry="8" fill="url(#gold)"/>
  <!-- Display -->
  <rect x="14" y="12" width="36" height="14" rx="4" ry="4" fill="#1a1000" opacity="0.85"/>
  <!-- Linha de resultado -->
  <rect x="20" y="20" width="24" height="3" rx="1.5" fill="#FFD700" opacity="0.7"/>
  <!-- Botões — linha 1 -->
  <rect x="14" y="32" width="8" height="7" rx="2" fill="#1a1000" opacity="0.7"/>
  <rect x="25" y="32" width="8" height="7" rx="2" fill="#1a1000" opacity="0.7"/>
  <rect x="36" y="32" width="8" height="7" rx="2" fill="#1a1000" opacity="0.7"/>
  <rect x="47" y="32" width="5" height="7" rx="2" fill="#FFD700" opacity="0.9"/>
  <!-- Botões — linha 2 -->
  <rect x="14" y="42" width="8" height="7" rx="2" fill="#1a1000" opacity="0.7"/>
  <rect x="25" y="42" width="8" height="7" rx="2" fill="#1a1000" opacity="0.7"/>
  <rect x="36" y="42" width="8" height="7" rx="2" fill="#1a1000" opacity="0.7"/>
  <rect x="47" y="42" width="5" height="7" rx="2" fill="#FFD700" opacity="0.9"/>
  <!-- Botão igual (largo) -->
  <rect x="14" y="52" width="36" height="4" rx="2" fill="#FFD700" opacity="0.95"/>
</svg>
